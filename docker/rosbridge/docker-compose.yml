services:
  rosbridge:
    build:
      context: ../..
      dockerfile: docker/rosbridge/Dockerfile
    environment:
      ROS_DISTRO: kilted
    ports:
      - "9090:9090"
    command: >
      bash -lc
      "source /opt/ros/$$ROS_DISTRO/setup.bash &&
      ros2 launch rosbridge_server rosbridge_websocket_launch.xml"

  pub:
    build:
      context: ../..
      dockerfile: docker/rosbridge/Dockerfile
    environment:
      ROS_DISTRO: kilted
    network_mode: "service:rosbridge"
    command: >
      bash -lc
      "source /opt/ros/$$ROS_DISTRO/setup.bash &&
      ros2 topic pub /test_from_ros std_msgs/msg/String \"data: 'hello from ros'\" --rate 1"

  echo:
    build:
      context: ../..
      dockerfile: docker/rosbridge/Dockerfile
    environment:
      ROS_DISTRO: kilted
    network_mode: "service:rosbridge"
    command: >
      bash -lc
      "source /opt/ros/$$ROS_DISTRO/setup.bash &&
      ros2 topic echo /test_from_android std_msgs/msg/String"
