name: Issue/Milestone Audit Log

on:
  milestone:
    types: [created, edited, opened, closed, deleted]
  issues:
    types:
      [
        opened,
        edited,
        deleted,
        closed,
        reopened,
        assigned,
        unassigned,
        labeled,
        unlabeled,
        milestoned,
        demilestoned,
        locked,
        unlocked,
        transferred,
        pinned,
        unpinned,
      ]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: write

concurrency:
  group: issue-milestone-audit-log
  cancel-in-progress: false

jobs:
  append-audit-record:
    runs-on: ubuntu-latest
    steps:
      - name: Verify audit push token is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.AUDIT_LOG_PUSH_TOKEN }}" ]; then
            echo "AUDIT_LOG_PUSH_TOKEN is not configured."
            exit 1
          fi

      - name: Checkout audit-log branch
        uses: actions/checkout@v4
        with:
          ref: audit-log
          fetch-depth: 0
          token: ${{ secrets.AUDIT_LOG_PUSH_TOKEN }}

      - name: Append event record
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit

          record=$(jq -c '{
            timestamp: (now | todateiso8601),
            repo: .repository.full_name,
            event_name: env.GITHUB_EVENT_NAME,
            action: .action,
            actor: .sender.login,
            run_id: env.GITHUB_RUN_ID,
            run_attempt: env.GITHUB_RUN_ATTEMPT,
            sender: {
              login: .sender.login,
              html_url: .sender.html_url
            },
            issue: (if .issue then {
              number: .issue.number,
              title: .issue.title,
              state: .issue.state,
              html_url: .issue.html_url,
              milestone: (if .issue.milestone then {
                number: .issue.milestone.number,
                title: .issue.milestone.title
              } else null end)
            } else null end),
            comment: (if .comment then {
              id: .comment.id,
              html_url: (.comment.html_url // null),
              created_at: (.comment.created_at // null),
              updated_at: (.comment.updated_at // null),
              body: (.comment.body // null)
            } else null end),
            milestone: (if .milestone then {
              number: .milestone.number,
              title: .milestone.title,
              state: .milestone.state,
              due_on: .milestone.due_on,
              html_url: .milestone.html_url,
              description: .milestone.description
            } else null end),
            changes: (.changes // null),
            target_url: (.issue.html_url // .milestone.html_url // null)
          }' "$GITHUB_EVENT_PATH")

          echo "$record" >> audit/events.ndjson

      - name: Build human-readable last 100 events
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "# Last 100 Audit Events"
            echo
            echo "This file is generated from \`audit/events.ndjson\`."
            echo
            echo "| Timestamp (UTC) | Actor | Event | Issue | Milestone | Details | Link |"
            echo "|---|---|---|---|---|---|---|"
            tail -n 100 audit/events.ndjson | jq -r '
              def clean($s):
                ($s // "-")
                | gsub("[\\r\\n]+"; " ")
                | gsub("\\|"; "\\\\|");

              def trunc($s; $n):
                if ($s | length) > $n then ($s[0:$n] + "...") else $s end;

              def issue_text:
                if .issue == null then "-"
                else "#\(.issue.number) \(.issue.title // "")"
                end;

              def milestone_text:
                if .milestone != null then
                  "#\(.milestone.number) \(.milestone.title // "")"
                elif (.issue != null and .issue.milestone != null) then
                  "#\(.issue.milestone.number) \(.issue.milestone.title // "")"
                else "-"
                end;

              def details_text:
                if .event_name == "issue_comment" then
                  (
                    if .action == "created" then
                      "comment created: " + trunc(clean(.comment.body); 200)
                    elif .action == "edited" then
                      "comment edited"
                      + (if (.changes != null and .changes.body != null and .changes.body.from != null)
                          then " | from: " + trunc(clean(.changes.body.from); 120)
                          else ""
                         end)
                      + (if (.comment != null and .comment.body != null)
                          then " | to: " + trunc(clean(.comment.body); 120)
                          else ""
                         end)
                    elif .action == "deleted" then
                      "comment deleted"
                      + (if (.comment != null and .comment.body != null)
                          then " | last body: " + trunc(clean(.comment.body); 160)
                          else ""
                         end)
                    else
                      "-"
                    end
                  )
                elif (.changes != null) then
                  (
                    [
                      (if .changes.title then ("title: " + clean(.changes.title.from) + " -> " + clean(.issue.title // .milestone.title // "")) else empty end),
                      (if .changes.description then ("description changed") else empty end),
                      (if .changes.body then ("body changed") else empty end),
                      (if .changes.due_on then ("due_on: " + clean(.changes.due_on.from) + " -> " + clean(.milestone.due_on)) else empty end),
                      (if .changes.state then ("state: " + clean(.changes.state.from) + " -> " + clean(.issue.state // .milestone.state // "")) else empty end),
                      (if .changes.milestone then ("milestone changed") else empty end)
                    ]
                    | if length == 0 then "-" else join("; ") end
                  )
                elif .event_name == "issues" and (.action == "opened" or .action == "closed" or .action == "reopened") then
                  "issue " + .action
                elif .event_name == "issues" and (.action == "milestoned" or .action == "demilestoned") then
                  "issue " + .action
                elif .event_name == "milestone" and (.action == "opened" or .action == "closed" or .action == "created" or .action == "deleted") then
                  "milestone " + .action
                else
                  "-"
                end;

              [
                (.timestamp // "-"),
                (.actor // "-"),
                (((.event_name // "-") + "." + (.action // "-"))),
                issue_text,
                milestone_text,
                details_text,
                (.target_url // "-")
              ]
              | @tsv
            ' | while IFS=$'\t' read -r ts actor ev issue ms details url; do
              safe_issue=$(printf '%s' "$issue" | tr '\n\r' ' ')
              safe_ms=$(printf '%s' "$ms" | tr '\n\r' ' ')
              safe_ev=$(printf '%s' "$ev" | tr '\n\r' ' ')
              safe_actor=$(printf '%s' "$actor" | tr '\n\r' ' ')
              safe_details=$(printf '%s' "$details" | tr '\n\r' ' ')

              if [ "$url" = "-" ]; then
                link_cell='-'
              else
                link_cell="[link]($url)"
              fi

              printf '| %s | %s | %s | %s | %s | %s | %s |\n' "$ts" "$safe_actor" "$safe_ev" "$safe_issue" "$safe_ms" "$safe_details" "$link_cell"
            done
          } > audit/LAST_100.md

      - name: Commit and push audit update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- audit/events.ndjson audit/LAST_100.md; then
            echo "No audit changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add audit/events.ndjson audit/LAST_100.md
          git commit -m "chore(audit): log ${{ github.event_name }}.${{ github.event.action }}"
          git push origin HEAD:audit-log
