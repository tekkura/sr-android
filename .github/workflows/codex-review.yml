name: Codex PR Review

on:
  pull_request_target:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    uses: tekkura/github-workflows/.github/workflows/codex-review.yml@codex/shared-review-workflows
    with:
      codex_model: ${{ vars.CODEX_MODEL || 'gpt-5.5' }}
      review_prompt_path: .github/codex/prompts/review.md
      migration_guides_dir: docs/migrations
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
