name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_STORE_FILE: release.jks
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: 'true'

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_STRING" ]; then
            echo "$ENCODED_STRING" | base64 --decode > $RELEASE_STORE_FILE
          else
            echo "ERROR: RELEASE_KEYSTORE_BASE64 secret is missing. Automated releases must be signed."
            exit 1
          fi
        shell: bash

      - name: Build
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          gradle-encryption-key: ${{ secrets.GradleEncryptionKey }}
          github-user: ${{ github.actor }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        uses: ./.github/actions/build-apk

      - name: Verify Signing
        run: |
          # Find apksigner in the Android SDK
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "ERROR: apksigner not found."
            exit 1
          fi
          
          echo "Using apksigner at: $APKSIGNER"
          
          # Iterate through apps defined in apps-config.json
          APPS=$(jq -r '.apps[]' apps-config.json)
          
          for app in $APPS; do
            apk="apps/$app/build/outputs/apk/release/$app-release.apk"
            if [ -f "$apk" ]; then
              echo "Verifying $apk..."
              $APKSIGNER verify --print-certs -v "$apk" || { echo "Verification failed for $apk"; exit 1; }
            else
              echo "ERROR: $apk not found. Release build likely failed to produce a signed APK for $app."
              exit 1
            fi
          done
        shell: bash

      - name: Prepare Release Artifacts
        id: artifacts
        run: |
          # Generate file list for apps (APK) from apps-config.json
          APP_FILES=$(jq -r '.apps[] | "apps/\(.)/build/outputs/apk/debug/\(.)-debug.apk\napps/\(.)/build/outputs/apk/release/\(.)-release.apk"' apps-config.json)
          
          # Generate file list for libs (AAR) from apps-config.json
          LIB_FILES=$(jq -r '.libs[] | "libs/\(.)/build/outputs/aar/\(.)-debug.aar\nlibs/\(.)/build/outputs/aar/\(.)-release.aar"' apps-config.json)
          
          COMBINED_FILES="$APP_FILES"$'\n'"$LIB_FILES"
          
          # Filter only existing files and prepare multiline output
          echo "release_files<<EOF" >> $GITHUB_OUTPUT
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "$file" >> $GITHUB_OUTPUT
            fi
          done <<< "$COMBINED_FILES"
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifacts.outputs.release_files }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Print environment variables
        run: |
          echo "GITHUB_ACTOR: $GITHUB_ACTOR"
          echo "GITHUB_TOKEN: $GITHUB_TOKEN"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package
        run: ./gradlew publish
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Keystore
        if: always()
        run: rm -f $RELEASE_STORE_FILE
        shell: bash
