name: Codex Review Reply

on:
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-reply:
    uses: tekkura/github-workflows/.github/workflows/codex-reply.yml@codex/shared-review-workflows
    with:
      codex_model: ${{ vars.CODEX_MODEL || 'gpt-5.5' }}
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
